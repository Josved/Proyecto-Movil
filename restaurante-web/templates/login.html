<!DOCTYPE html>
<html lang="es">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Control - Iniciar Sesión</title>
 
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
 
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4b3621, #7a5c3e);
        }
 
        .login-box {
            background: #fff;
            width: 350px;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            text-align: center;
        }
 
        .login-box h2 {
            color: #4b3621;
            margin-bottom: 5px;
        }
 
        .login-box p {
            color: #7a706a;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }
 
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
 
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #7a706a;
            text-transform: uppercase;
        }
 
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d9d2c9;
            border-radius: 6px;
            font-size: 0.95rem;
        }
 
        .form-group input:focus {
            outline: none;
            border-color: #7a5c3e;
        }
 
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #4b3621;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
 
        .btn-login:hover {
            background: #3a2a19;
        }
 
        #errorMsg {
            display: none;
            color: #c0392b;
            background: #fdecea;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }
    </style>
</head>
 
<body>
 
    <div class="login-box">
 
        <h2>Café Control</h2>
        <p>Inicia sesión para continuar</p>
 
        <p id="errorMsg"></p>
 
        <form id="loginForm">
 
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="username" placeholder="Ej. admin" required>
            </div>
 
            <button type="submit" class="btn-login">Entrar</button>
 
        </form>
 
    </div>
 
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
 
</body>
 
</html>
